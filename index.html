<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBGM FAQ 관리 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --text2: #8b8fa8;
    --text3: #565a75;
    --accent: #f5a623;
    --accent2: #e8912a;
    --blue: #4a90d9;
    --green: #4caf7d;
    --red: #e05555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
  .logo span { color: var(--text); font-weight: 400; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all .15s; font-weight: 500; }
  .btn:hover { border-color: rgba(255,255,255,0.2); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .btn-primary:hover { background: var(--accent2); }
  .layout { display: flex; height: calc(100vh - 60px); }
  .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); padding: 1.25rem 0.75rem; flex-shrink: 0; overflow-y: auto; }
  .sidebar-title { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; padding: 0 8px; }
  .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all .15s; margin-bottom: 2px; user-select: none; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(245,166,35,0.15); color: var(--accent); font-weight: 500; }
  .nav-count { font-size: 11px; background: var(--bg3); padding: 2px 7px; border-radius: 10px; color: var(--text3); min-width: 24px; text-align: center; }
  .nav-item.active .nav-count { background: rgba(245,166,35,0.2); color: var(--accent); }
  .sidebar-divider { height: 1px; background: var(--border); margin: 10px 0; }
  .main { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
  .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .stat-val { font-size: 26px; font-weight: 700; }
  .stat-val.accent { color: var(--accent); }
  .stat-val.green { color: var(--green); }
  .stat-val.blue { color: var(--blue); }
  .stat-val.white { color: var(--text); }
  .toolbar { display: flex; gap: 10px; margin-bottom: 1.25rem; align-items: center; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: rgba(245,166,35,0.5); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
  .lang-toggle { display: flex; gap: 4px; }
  .lang-btn { padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
  .lang-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .lang-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .faq-count { font-size: 13px; color: var(--text3); margin-bottom: 10px; }
  .faq-count span { color: var(--text); font-weight: 500; }
  .faq-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; transition: border-color .15s; }
  .faq-item:hover { border-color: rgba(255,255,255,0.15); }
  .faq-item.expanded { border-color: rgba(245,166,35,0.35); }
  .faq-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .faq-header-left { flex: 1; min-width: 0; }
  .faq-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
  .badge-결제 { background: rgba(74,144,217,0.15); color: #6ab0f5; border: 1px solid rgba(74,144,217,0.3); }
  .badge-게임 { background: rgba(245,166,35,0.15); color: var(--accent); border: 1px solid rgba(245,166,35,0.3); }
  .badge-신고 { background: rgba(224,85,85,0.1); color: #ffaaaa; border: 1px solid rgba(224,85,85,0.2); }
  .badge-계정 { background: rgba(124,111,255,0.15); color: #a89fff; border: 1px solid rgba(124,111,255,0.3); }
  .badge-support { background: rgba(76,175,125,0.15); color: #7dd4a8; border: 1px solid rgba(76,175,125,0.3); }
  .badge-라이선스 { background: rgba(139,143,168,0.12); color: var(--text2); border: 1px solid rgba(139,143,168,0.2); }
  .badge-사업자 { background: rgba(139,143,168,0.12); color: var(--text2); border: 1px solid rgba(139,143,168,0.2); }
  .badge-기타 { background: rgba(139,143,168,0.12); color: var(--text2); border: 1px solid rgba(139,143,168,0.2); }
  .badge-published { background: rgba(76,175,125,0.15); color: var(--green); border: 1px solid rgba(76,175,125,0.3); }
  .badge-draft { background: rgba(139,143,168,0.08); color: var(--text3); border: 1px solid var(--border); }
  .faq-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .faq-preview { font-size: 12px; color: var(--text3); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .media-tag { font-size: 11px; color: var(--text3); }
  .chevron { color: var(--text3); font-size: 11px; transition: transform .2s; flex-shrink: 0; margin-top: 2px; }
  .faq-item.expanded .chevron { transform: rotate(180deg); }
  .faq-body { border-top: 1px solid var(--border); padding: 16px; display: none; }
  .faq-item.expanded .faq-body { display: block; }
  .lang-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
  .lang-tab { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
  .lang-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .lang-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .faq-content { display: none; }
  .faq-content.active { display: block; }
  .content-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 10px; line-height: 1.5; }
  .content-body { font-size: 13px; color: var(--text2); line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
  .media-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .media-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
  .video-wrap { position: relative; width: 100%; max-width: 560px; padding-bottom: 31.5%; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 10px; }
  .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .img-thumb { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 16/9; background: var(--bg3); }
  .img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .faq-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .btn-edit { background: rgba(74,144,217,0.1); border-color: rgba(74,144,217,0.3); color: var(--blue); }
  .btn-hs { background: rgba(245,166,35,0.1); border-color: rgba(245,166,35,0.3); color: var(--accent); }
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text3); }
  .empty { text-align: center; padding: 60px; color: var(--text3); font-size: 14px; }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1.5rem; padding-bottom: 2rem; flex-wrap: wrap; }
  .page-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 13px; cursor: pointer; transition: all .15s; font-family: 'Noto Sans KR', sans-serif; }
  .page-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .page-btn:disabled { opacity: .3; cursor: not-allowed; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 680px; max-height: 88vh; overflow-y: auto; padding: 1.5rem; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .form-group { margin-bottom: 1rem; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--text3); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .lang-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lang-dot.en { background: var(--blue); }
  .lang-dot.ja { background: #f080a0; }
  .lang-dot.ko { background: var(--green); }
  .form-input { width: 100%; padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; }
  .form-input:focus { border-color: rgba(245,166,35,0.5); }
  .form-textarea { width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; resize: vertical; min-height: 90px; line-height: 1.6; }
  .form-textarea:focus { border-color: rgba(245,166,35,0.5); }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; flex-wrap: wrap; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: var(--text); z-index: 300; transform: translateY(16px); opacity: 0; transition: all .3s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(76,175,125,0.5); }
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .sidebar { display: none; }
    .main { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">PUBGM <span>FAQ 관리</span></div>
  <div class="header-right">
    <span id="last-sync" style="font-size:12px;color:var(--text3)">로딩 중...</span>
    <button class="btn" onclick="loadData()">새로고침</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ 신규 FAQ</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">카테고리</div>
    <div class="nav-item active" data-filter-type="category" data-filter-val="all">전체 <span class="nav-count" id="cnt-all">0</span></div>
    <div class="nav-item" data-filter-type="category" data-filter-val="결제">결제 및 환불 <span class="nav-count" id="cnt-결제">0</span></div>
    <div class="nav-item" data-filter-type="category" data-filter-val="게임">게임관련 <span class="nav-count" id="cnt-게임">0</span></div>
    <div class="nav-item" data-filter-type="category" data-filter-val="신고">신고 및 차단 <span class="nav-count" id="cnt-신고">0</span></div>
    <div class="nav-item" data-filter-type="category" data-filter-val="계정">계정 관련 <span class="nav-count" id="cnt-계정">0</span></div>
    <div class="nav-item" data-filter-type="category" data-filter-val="support">PUBGM Support <span class="nav-count" id="cnt-support">0</span></div>
    <div class="nav-item" data-filter-type="category" data-filter-val="라이선스">오픈소스 라이선스 <span class="nav-count" id="cnt-라이선스">0</span></div>
    <div class="nav-item" data-filter-type="category" data-filter-val="사업자">사업자 정보 <span class="nav-count" id="cnt-사업자">0</span></div>
    <div class="nav-item" data-filter-type="category" data-filter-val="기타">기타 <span class="nav-count" id="cnt-기타">0</span></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-title">상태</div>
    <div class="nav-item" data-filter-type="status" data-filter-val="published">게시됨 <span class="nav-count" id="cnt-published">0</span></div>
    <div class="nav-item" data-filter-type="status" data-filter-val="draft">초안 <span class="nav-count" id="cnt-draft">0</span></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-title">미디어</div>
    <div class="nav-item" data-filter-type="media" data-filter-val="video">동영상 있음 <span class="nav-count" id="cnt-video">0</span></div>
    <div class="nav-item" data-filter-type="media" data-filter-val="image">이미지 있음 <span class="nav-count" id="cnt-image">0</span></div>
  </div>

  <div class="main">
    <div class="stats">
      <div class="stat-card"><div class="stat-label">전체 FAQ</div><div class="stat-val accent" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">게시됨</div><div class="stat-val green" id="stat-pub">0</div></div>
      <div class="stat-card"><div class="stat-label">동영상 포함</div><div class="stat-val blue" id="stat-video">0</div></div>
      <div class="stat-card"><div class="stat-label">이미지 포함</div><div class="stat-val white" id="stat-image">0</div></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="FAQ 검색 (제목, 내용)..." autocomplete="off">
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="ko">한국어</button>
        <button class="lang-btn" data-lang="en">English</button>
        <button class="lang-btn" data-lang="ja">日本語</button>
      </div>
    </div>

    <div class="faq-count">총 <span id="filtered-count">0</span>개의 FAQ</div>
    <div id="faq-list"><div class="loading"><div class="spinner"></div><div class="loading-text">FAQ 데이터 불러오는 중...</div></div></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">FAQ 수정</div>
      <button class="modal-close" id="modal-close-btn">×</button>
    </div>
    <div class="form-group"><div class="form-label"><span class="lang-dot en"></span> 영어 제목</div><input type="text" class="form-input" id="edit-en-title" placeholder="English title"></div>
    <div class="form-group"><div class="form-label"><span class="lang-dot en"></span> 영어 내용</div><textarea class="form-textarea" id="edit-en-body" placeholder="English answer"></textarea></div>
    <div class="form-group"><div class="form-label"><span class="lang-dot ja"></span> 일본어 제목</div><input type="text" class="form-input" id="edit-ja-title" placeholder="日本語タイトル"></div>
    <div class="form-group"><div class="form-label"><span class="lang-dot ja"></span> 일본어 내용</div><textarea class="form-textarea" id="edit-ja-body" placeholder="日本語の回答"></textarea></div>
    <div class="form-group"><div class="form-label"><span class="lang-dot ko"></span> 한국어 제목</div><input type="text" class="form-input" id="edit-ko-title" placeholder="한국어 제목"></div>
    <div class="form-group"><div class="form-label"><span class="lang-dot ko"></span> 한국어 내용</div><textarea class="form-textarea" id="edit-ko-body" placeholder="한국어 답변"></textarea></div>
    <div class="form-group"><div class="form-label">YouTube URL</div><input type="text" class="form-input" id="edit-youtube" placeholder="https://www.youtube.com/embed/..."></div>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel-btn">취소</button>
      <button class="btn btn-hs" onclick="saveToHelpshift()">Helpshift 등록</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1jtc2TgQTpwHI_KUVQ5ztwomnPWoCVPO_wX7Cr6AjRBM';
const SHEET_NAME = 'PUBGM_FAQ_Master';
const API_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SHEET_NAME);

// ✅ 수정 1: section_num 기반 카테고리 매핑 (확정된 섹션 ID)
const SECTION_MAP = {
  '8':  '결제',
  '11': '게임',
  '14': '신고',
  '15': '계정',
  '17': 'support',
  '32': '라이선스',
  '60': '사업자'
};

const CATEGORY_LABELS = {
  '결제': '결제 및 환불',
  '게임': '게임관련',
  '신고': '신고 및 차단',
  '계정': '계정 관련',
  'support': 'PUBGM Support',
  '라이선스': '오픈소스 라이선스',
  '사업자': '사업자 정보',
  '기타': '기타'
};

let allFaqs = [];
let filteredFaqs = [];
let currentLang = 'ko';
let currentPage = 1;
const PAGE_SIZE = 20;
let activeCategory = 'all';
let activeStatus = '';
let activeMedia = '';
let searchQuery = '';
let editingIdx = null;

// ✅ 수정 1: section_num 기반으로 카테고리 결정
function getCategory(faq) {
  const sectionNum = (faq.section_num || '').trim();
  return SECTION_MAP[sectionNum] || '기타';
}

async function loadData() {
  document.getElementById('faq-list').innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">FAQ 데이터 불러오는 중...</div></div>';
  try {
    const res = await fetch(API_URL + '&t=' + Date.now());
    const text = await res.text();
    const clean = text.replace(/^\/\*O_o\*\//, '').replace(/google\.visualization\.Query\.setResponse\(/, '').replace(/\);?\s*$/, '');
    const json = JSON.parse(clean);
    const cols = json.table.cols.map(c => c.label);
    allFaqs = (json.table.rows || []).map(row => {
      const obj = {};
      cols.forEach((col, i) => { obj[col] = (row.c && row.c[i] && row.c[i].v !== null && row.c[i].v !== undefined) ? String(row.c[i].v) : ''; });
      return obj;
    }).filter(f => f.faq_id && f.faq_id.trim());

    updateStats();
    updateCounts();
    applyFilters();
    document.getElementById('last-sync').textContent = '동기화: ' + new Date().toLocaleTimeString('ko-KR');
  } catch(e) {
    console.error(e);
    document.getElementById('faq-list').innerHTML = '<div class="empty">데이터를 불러오지 못했어요.<br>잠시 후 새로고침 해주세요.</div>';
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = allFaqs.length;
  document.getElementById('stat-pub').textContent = allFaqs.filter(f => f.publish_status === 'published').length;
  const videoCount = allFaqs.filter(f => {
    const imgs = f.image_urls || '';
    return (f.youtube_url && f.youtube_url.trim()) || imgs.includes('youtube') || imgs.includes('youtu.be');
  }).length;
  const imageCount = allFaqs.filter(f => {
    const imgs = f.image_urls || '';
    return imgs.trim() && !imgs.split(',').every(u => u.includes('youtube') || u.includes('youtu.be'));
  }).length;
  document.getElementById('stat-video').textContent = videoCount;
  document.getElementById('stat-image').textContent = imageCount;
}

function updateCounts() {
  const cats = ['결제','게임','신고','계정','support','라이선스','사업자','기타'];
  const counts = {};
  cats.forEach(c => counts[c] = 0);
  allFaqs.forEach(f => { const c = getCategory(f); counts[c] = (counts[c] || 0) + 1; });
  document.getElementById('cnt-all').textContent = allFaqs.length;
  cats.forEach(c => { const el = document.getElementById('cnt-' + c); if(el) el.textContent = counts[c] || 0; });
  document.getElementById('cnt-published').textContent = allFaqs.filter(f => f.publish_status === 'published').length;
  document.getElementById('cnt-draft').textContent = allFaqs.filter(f => f.publish_status !== 'published').length;
  document.getElementById('cnt-video').textContent = allFaqs.filter(f => {
    const imgs = f.image_urls || '';
    return (f.youtube_url && f.youtube_url.trim()) || imgs.includes('youtube') || imgs.includes('youtu.be');
  }).length;
  document.getElementById('cnt-image').textContent = allFaqs.filter(f => {
    const imgs = f.image_urls || '';
    return imgs.trim() && !imgs.split(',').every(u => u.includes('youtube') || u.includes('youtu.be'));
  }).length;
}

// ✅ 수정 2: 검색 버그 수정 - searchQuery 동기화 문제 해결
function applyFilters() {
  const q = searchQuery.trim().toLowerCase();
  filteredFaqs = allFaqs.filter(f => {
    const cat = getCategory(f);
    if (activeCategory !== 'all' && cat !== activeCategory) return false;
    if (activeStatus && f.publish_status !== activeStatus) return false;
    if (activeMedia === 'video') {
      const imgs = f.image_urls || '';
      if (!(f.youtube_url && f.youtube_url.trim()) && !imgs.includes('youtube') && !imgs.includes('youtu.be')) return false;
    }
    if (activeMedia === 'image') {
      const imgs = f.image_urls || '';
      if (!imgs.trim() || imgs.split(',').every(u => u.includes('youtube') || u.includes('youtu.be'))) return false;
    }
    if (q) {
      const hay = [f.ko_title, f.ko_body, f.en_title, f.en_body, f.ja_title, f.ja_body].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('filtered-count').textContent = filteredFaqs.length;
  currentPage = 1;
  renderFaqs();
}

function getTitle(f) {
  if (currentLang === 'ko') return f.ko_title || f.en_title || '';
  if (currentLang === 'ja') return f.ja_title || f.en_title || '';
  return f.en_title || '';
}

function getBody(f) {
  if (currentLang === 'ko') return f.ko_body || f.en_body || '';
  if (currentLang === 'ja') return f.ja_body || f.en_body || '';
  return f.en_body || '';
}

function renderFaqs() {
  const list = document.getElementById('faq-list');
  if (!filteredFaqs.length) {
    list.innerHTML = '<div class="empty">FAQ가 없어요</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filteredFaqs.slice(start, start + PAGE_SIZE);
  list.innerHTML = pageItems.map((f, i) => buildFaqHtml(f, start + i)).join('');
  renderPagination();
}

function buildFaqHtml(f, idx) {
  const cat = getCategory(f);
  const catLabel = CATEGORY_LABELS[cat] || cat;
  const title = getTitle(f);
  const body = getBody(f);
  const isPub = f.publish_status === 'published';
  const imgs = f.image_urls || '';
  const hasVideo = (f.youtube_url && f.youtube_url.trim()) || imgs.includes('youtube') || imgs.includes('youtu.be');
  const hasImage = imgs.trim() && !imgs.split(',').every(u => u.trim() === '' || u.includes('youtube') || u.includes('youtu.be'));
  const mediaTags = [hasVideo ? '▶ 동영상' : '', hasImage ? '🖼 이미지' : ''].filter(Boolean).join(' · ');

  const ytUrl = (f.youtube_url && f.youtube_url.trim()) ? f.youtube_url.trim() : (imgs.split(',').find(u => u.includes('youtube') || u.includes('youtu.be')) || '').trim();
  const imageList = imgs.split(',').map(u => u.trim()).filter(u => u && !u.includes('youtube') && !u.includes('youtu.be'));

  const videoHtml = ytUrl ? '<div class="media-section"><div class="media-label">동영상</div><div class="video-wrap"><iframe src="' + ytUrl + '" allowfullscreen></iframe></div></div>' : '';
  const imgHtml = imageList.length ? '<div class="media-section"><div class="media-label">이미지</div><div class="img-grid">' + imageList.map(u => '<div class="img-thumb"><img src="' + u + '" loading="lazy" onerror="this.parentElement.style.display=\'none\'"></div>').join('') + '</div></div>' : '';

  const koActive = currentLang === 'ko' ? ' active' : '';
  const enActive = currentLang === 'en' ? ' active' : '';
  const jaActive = currentLang === 'ja' ? ' active' : '';

  return '<div class="faq-item" id="faq-' + idx + '">' +
    '<div class="faq-header" onclick="toggleFaq(' + idx + ')">' +
      '<div class="faq-header-left">' +
        '<div class="faq-meta">' +
          '<span class="badge badge-' + cat + '">' + catLabel + '</span>' +
          '<span class="badge badge-' + (isPub ? 'published' : 'draft') + '">' + (isPub ? '게시됨' : '초안') + '</span>' +
          (mediaTags ? '<span class="media-tag">' + mediaTags + '</span>' : '') +
        '</div>' +
        '<div class="faq-title">' + (title || '(제목 없음)') + '</div>' +
        '<div class="faq-preview">' + (body || '').substring(0, 90) + (body && body.length > 90 ? '...' : '') + '</div>' +
      '</div>' +
      '<span class="chevron">▼</span>' +
    '</div>' +
    '<div class="faq-body">' +
      '<div class="lang-tabs">' +
        '<button class="lang-tab' + koActive + '" onclick="switchTab(event,' + idx + ',\'ko\')">한국어</button>' +
        '<button class="lang-tab' + enActive + '" onclick="switchTab(event,' + idx + ',\'en\')">English</button>' +
        '<button class="lang-tab' + jaActive + '" onclick="switchTab(event,' + idx + ',\'ja\')">日本語</button>' +
      '</div>' +
      '<div class="faq-content' + koActive + '" id="fc-' + idx + '-ko"><div class="content-title">' + (f.ko_title || '(제목 없음)') + '</div><div class="content-body">' + (f.ko_body || '(내용 없음)') + '</div>' + videoHtml + imgHtml + '</div>' +
      '<div class="faq-content' + enActive + '" id="fc-' + idx + '-en"><div class="content-title">' + (f.en_title || '(No title)') + '</div><div class="content-body">' + (f.en_body || '(No content)') + '</div>' + videoHtml + imgHtml + '</div>' +
      '<div class="faq-content' + jaActive + '" id="fc-' + idx + '-ja"><div class="content-title">' + (f.ja_title || '(タイトルなし)') + '</div><div class="content-body">' + (f.ja_body || '(内容なし)') + '</div>' + videoHtml + imgHtml + '</div>' +
      '<div class="faq-actions">' +
        '<button class="btn btn-edit" onclick="openEditModal(' + idx + ')">수정</button>' +
        '<button class="btn btn-hs" onclick="window.open(\'https://pubgmobile.helpshift.com/hc/ko/\',\'_blank\')">Helpshift 보기</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggleFaq(idx) {
  document.getElementById('faq-' + idx).classList.toggle('expanded');
}

function switchTab(e, idx, lang) {
  e.stopPropagation();
  const item = document.getElementById('faq-' + idx);
  item.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
  item.querySelectorAll('.faq-content').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('fc-' + idx + '-' + lang).classList.add('active');
}

function renderPagination() {
  const total = Math.ceil(filteredFaqs.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = '<button class="page-btn" onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>◀</button>';
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || Math.abs(i - currentPage) <= 2) {
      html += '<button class="page-btn ' + (i === currentPage ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    } else if (Math.abs(i - currentPage) === 3) {
      html += '<span style="color:var(--text3);padding:0 4px">...</span>';
    }
  }
  html += '<button class="page-btn" onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage === total ? 'disabled' : '') + '>▶</button>';
  pg.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filteredFaqs.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderFaqs();
  document.querySelector('.main').scrollTop = 0;
}

function openEditModal(idx) {
  editingIdx = idx;
  const f = filteredFaqs[idx];
  document.getElementById('modal-title').textContent = 'FAQ 수정';
  document.getElementById('edit-en-title').value = f.en_title || '';
  document.getElementById('edit-en-body').value = f.en_body || '';
  document.getElementById('edit-ja-title').value = f.ja_title || '';
  document.getElementById('edit-ja-body').value = f.ja_body || '';
  document.getElementById('edit-ko-title').value = f.ko_title || '';
  document.getElementById('edit-ko-body').value = f.ko_body || '';
  document.getElementById('edit-youtube').value = f.youtube_url || '';
  document.getElementById('edit-modal').classList.add('open');
}

function openAddModal() {
  editingIdx = null;
  document.getElementById('modal-title').textContent = '신규 FAQ 추가';
  ['en-title','en-body','ja-title','ja-body','ko-title','ko-body','youtube'].forEach(id => { document.getElementById('edit-' + id).value = ''; });
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

function saveEdit() { showToast('저장됐어요!', 'success'); closeModal(); }
function saveToHelpshift() { showToast('n8n 워크플로우 연결 후 사용 가능해요.', 'success'); closeModal(); }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ✅ 수정 2: 검색 버그 수정
document.getElementById('search-input').addEventListener('input', function() {
  searchQuery = this.value;
  applyFilters();
});

// ✅ 수정 3: 카테고리 클릭 버그 수정 - 이벤트 위임 방식 개선
document.getElementById('sidebar').addEventListener('click', function(e) {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  const type = item.dataset.filterType;
  const val = item.dataset.filterVal;
  if (!type || !val) return;

  // 모든 nav-item active 제거
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  if (type === 'category') {
    // 같은 카테고리 다시 클릭 시 전체로 돌아감 (all 제외)
    if (activeCategory === val && val !== 'all') {
      activeCategory = 'all';
      activeStatus = '';
      activeMedia = '';
      document.querySelector('[data-filter-val="all"]').classList.add('active');
    } else {
      activeCategory = val;
      activeStatus = '';
      activeMedia = '';
      item.classList.add('active');
    }
  } else if (type === 'status') {
    if (activeStatus === val) {
      activeStatus = '';
      activeCategory = 'all';
      activeMedia = '';
      document.querySelector('[data-filter-val="all"]').classList.add('active');
    } else {
      activeStatus = val;
      activeCategory = 'all';
      activeMedia = '';
      item.classList.add('active');
    }
  } else if (type === 'media') {
    if (activeMedia === val) {
      activeMedia = '';
      activeCategory = 'all';
      activeStatus = '';
      document.querySelector('[data-filter-val="all"]').classList.add('active');
    } else {
      activeMedia = val;
      activeCategory = 'all';
      activeStatus = '';
      item.classList.add('active');
    }
  }
  applyFilters();
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    currentLang = this.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderFaqs();
  });
});

document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('edit-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

loadData();
</script>
